ProxyPass "/report/hr-text-chatbot/api" "http://127.0.0.1:8787/api"
ProxyPassReverse "/report/hr-text-chatbot/api" "http://127.0.0.1:8787/api"

Alias "/report/hr-text-chatbot/data/raw/" "/var/www/html/report/hr-text-chatbot/data/"
RedirectMatch 302 "^/report/hr-text-chatbot/data/(?!raw/|viewer\.html)(.*\.md)$" "/report/hr-text-chatbot/data/viewer.html?file=$1"

<LocationMatch "^/report/hr-text-chatbot/data/(raw/)?.*\.md$">
  ForceType "text/markdown; charset=UTF-8"
</LocationMatch>
